[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# API routes - use rewrites instead of redirects to avoid catch-all interference
[[rewrites]]
  from = "/api/auth/register"
  to = "/.netlify/functions/auth-register"
  status = 200

[[rewrites]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200

[[rewrites]]
  from = "/api/hello"
  to = "/.netlify/functions/hello"
  status = 200

[[rewrites]]
  from = "/api/users/:user_id/status"
  to = "/.netlify/functions/user-status?user_id=:user_id"
  status = 200

[[rewrites]]
  from = "/api/users/:user_id"
  to = "/.netlify/functions/user-profile?user_id=:user_id"
  status = 200

# Catch-all for React SPA - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
